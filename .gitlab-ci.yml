stages:
  - build
  - db_init

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - when: never

variables:
    EC2_INSTANCE_ID: "i-0c3b9b0d96a939724" # CHANGE
    DB_SECRET_ARN: "arn:aws:secretsmanager:us-east-2:131912109503:secret:rds!db-e70792c1-dde6-4368-a78d-95395d9a2031-qGRQWm" # CHANGE
    AWS_ROLE_ARN: "arn:aws:iam::131912109503:role/GitLab_ECRImagePush_Role"
    AWS_ACCOUNT_ID: "131912109503"
    RDS_ENDPOINT: "todo-db.c962yekmm5ja.us-east-2.rds.amazonaws.com"
    AWS_REGION: "us-east-2"
    DB_NAME: "todo_db"
    DB_PORT: 5432
    SQL_FILE: "database/init.sql"
    CORE_TABLE_NAME: "users"

.aws_oidc_auth: &aws_oidc_auth
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com # Update if using a self-hosted GitLab instance
  before_script:
    - echo "${GITLAB_OIDC_TOKEN}" > /tmp/web_identity_token
    - export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/web_identity_token

build_and_push_images:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  <<: *aws_oidc_auth
  script:
    - apk add --no-cache aws-cli
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
    - docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/frontend:latest ./frontend
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/frontend:latest
    - docker build -t $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/backend:latest ./backend
    - docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/backend:latest

initialize_database:
  stage: db_init
  image: ubuntu:22.04
  <<: *aws_oidc_auth # Uses the OIDC authentication anchor from our previous setup
  before_script:
    - export DEBIAN_FRONTEND=noninteractive
    - apt-get update && apt-get install -y curl unzip jq postgresql-client netcat-openbsd

    # 1. Install AWS CLI v2
    - curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
    - unzip -q awscliv2.zip && ./aws/install

    # 2. Install AWS SSM Session Manager Plugin
    - curl -sL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
    - dpkg -i session-manager-plugin.deb

    # 3. Setup OIDC Token
    - echo "${GITLAB_OIDC_TOKEN}" > /tmp/web_identity_token
    - export AWS_WEB_IDENTITY_TOKEN_FILE=/tmp/web_identity_token

  script:
    - echo "Fetching DB Credentials via Lookup..."
    - SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $DB_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
    - DB_USER=$(echo $SECRET_JSON | jq -r .username)
    - DB_PASS=$(echo $SECRET_JSON | jq -r .password)

    - echo "Establishing SSM Tunnel (Background)..."
    - |
      aws ssm start-session \
        --target "$EC2_INSTANCE_ID" \
        --document-name AWS-StartPortForwardingSessionToRemoteHost \
        --parameters host="$RDS_ENDPOINT",portNumber="$DB_PORT",localPortNumber="$DB_PORT" \
        --region "$AWS_REGION" > /dev/null 2>&1 &
    - TUNNEL_PID=$!
    - echo "Waiting for tunnel to stabilize..."
    # Loops until it can successfully reach port 5432 on localhost, or gives up after ~30 seconds
    - for i in {1..15}; do nc -z 127.0.0.1 $DB_PORT && break || sleep 2; done

    - echo "Checking if Core Table exists in Database..."
    - export PGPASSWORD=$DB_PASS
    - |
      TABLE_EXISTS=$(psql -h 127.0.0.1 -p $DB_PORT -U "$DB_USER" -d "$DB_NAME" -tAc "
        SELECT EXISTS (
          SELECT FROM information_schema.tables 
          WHERE table_schema = 'public' 
          AND table_name = '$CORE_TABLE_NAME'
        );
      ")

    - |
      if [ "$TABLE_EXISTS" = "f" ]; then
        echo "Database was empty. Applying initialization script..."
        psql -h 127.0.0.1 -p $DB_PORT -U "$DB_USER" -d "$DB_NAME" -f $SQL_FILE
        echo "Initialization script applied successfully."
      else
        echo "Table '$CORE_TABLE_NAME' found. Database is already initialized. Skipping."
      fi

  after_script:
    - echo "Tearing down SSM Tunnel..."
    # Failsafe cleanup: find whatever process is holding 5432 and kill it
    - PORT_PID=$(lsof -t -i:$DB_PORT || echo "")
    - if [ -n "$PORT_PID" ]; then kill -9 $PORT_PID; fi
