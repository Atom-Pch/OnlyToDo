apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  # HA
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Minikube
          # image: todo-frontend:latest
          # imagePullPolicy: Never # Forces Minikube to use the local image
          # ECR
          image: 131912109503.dkr.ecr.us-east-2.amazonaws.com/todo-frontend-repo:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          # Resource Requests and Limits
          resources:
            requests:
              memory: 128Mi
              cpu: 256m
            limits:
              memory: 256Mi
              cpu: 512m

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
  type: ClusterIP # Keeps it internal; we will expose it via Ingress
