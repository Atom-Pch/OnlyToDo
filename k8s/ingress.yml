apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
spec:
  # Tells the NGINX controller to process these rules
  ingressClassName: nginx
  rules:
    # We define a local domain name for testing
    - host: todo.local
      http:
        paths:
          # Route 1: All API requests go to the Go backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080

          # Route 2: Everything else goes to the SvelteKit frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
