prometheus:
  prometheusSpec:
    # Watch ServiceMonitors across ALL namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 24h
    resources:
      requests:
        memory: 256Mi
        cpu: 128m
      limits:
        memory: 512Mi
        cpu: 512m

grafana:
  admin:
    existingSecret: todo-secrets
    passwordKey: graf_admin_password
  persistence:
    enabled: false # keep off to avoid EBS costs; dashboards come from configmaps
  # Import your existing Go dashboard by its Grafana.com ID or embed it
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: custom
          folder: Custom
          type: file
          options:
            path: /var/lib/grafana/dashboards/custom
  dashboardsConfigMaps:
    custom: grafana-dashboard

alertmanager:
  enabled: false # disable until you need it

# These are on by default and give you free cluster metrics:
nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
