name: Build & Push Image

on:
  workflow_call:
    inputs:
      repo_name:
        required: true
        type: string
      context:
        required: true
        type: string

env:
  AWS_ROLE_ARN: "arn:aws:iam::131912109503:role/GitHubActionsRole"
  AWS_ACCOUNT_ID: "131912109503"
  AWS_REGION: "us-east-2"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build, Scan, and Push Docker Image
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr-login

      - name: Build
        id: build
        run: |
          IMAGE=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/${{ inputs.repo_name }}
          docker build -t $IMAGE:${GITHUB_SHA::7} ${{ inputs.context }}
          echo "image=$IMAGE:${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ steps.build.outputs.image }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push
        run: docker push ${{ steps.build.outputs.image }}
