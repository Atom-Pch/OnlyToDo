name: Infra - Morning Startup

on:
  workflow_dispatch:

env:
  AWS_ROLE_ARN: "arn:aws:iam::131912109503:role/GitHubActionsRole"
  APP_SECRET_ARN: "arn:aws:secretsmanager:us-east-2:131912109503:secret:todo-app-secrets-14Gg8G"
  AWS_ACCOUNT_ID: "131912109503"
  AWS_REGION: "us-east-2"
  CORE_TABLE_NAME: "users"
  FRONTEND_REPO: "todo-frontend-repo"
  BACKEND_REPO: "todo-backend-repo"

permissions:
  id-token: write
  contents: read

jobs:
  initialize_infrastructure:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init & Apply
        working-directory: iac/terraform/
        run: |
          terraform init
          terraform apply -auto-approve

  build_and_push_frontend_images:
    needs: [initialize_infrastructure]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images
        run: |
          docker build --provenance=false -t $FRONTEND_REPO ./frontend/
          docker tag $FRONTEND_REPO:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:latest
          docker tag $FRONTEND_REPO:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:${GITHUB_SHA::7}
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:${GITHUB_SHA::7}

  build_and_push_backend_images:
    needs: [initialize_infrastructure]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Images
        run: |
          docker build --provenance=false -t $BACKEND_REPO ./backend/
          docker tag $BACKEND_REPO:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:latest
          docker tag $BACKEND_REPO:latest $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:${GITHUB_SHA::7}
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:latest
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:${GITHUB_SHA::7}

  deploy_application:
    needs: [build_and_push_frontend_images, build_and_push_backend_images]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive
          curl -sL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o "session-manager-plugin.deb"
          sudo dpkg -i session-manager-plugin.deb

          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4
          chmod 700 get_helm.sh
          ./get_helm.sh

      - name: Add EKS Helm Repository
        run: |
          echo "Updating kubeconfig for EKS cluster..."
          aws eks update-kubeconfig --region $AWS_REGION --name todo-cluster

          echo "Fetching VPC ID for EKS Cluster..."
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=todo-vpc" \
            --query 'Vpcs[0].VpcId' \
            --output text)

          echo "Adding EKS Helm Repository and Install AWS Load Balancer Controller..."
          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade -i aws-load-balancer-controller eks/aws-load-balancer-controller \
            --version 3.2.2 \
            -n kube-system \
            --set clusterName=todo-cluster \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set region=$AWS_REGION \
            --set vpcId=$VPC_ID \
            --set image.repository=602401143452.dkr.ecr.us-east-2.amazonaws.com/amazon/aws-load-balancer-controller

      - name: Wait for Load Balancer Controller to become Ready
        run: |
          echo "Waiting for the aws-load-balancer-controller deployment to roll out..."
          kubectl rollout status deployment aws-load-balancer-controller -n kube-system --timeout=1m
          echo "Controller is ready! Proceeding to application deployment."

      - name: Install Argo CD, Image Updater, and Applications
        run: |
          echo "Creating Argo CD namespace..."
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

          echo "Getting ArgoCD Github permissions..."
          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $APP_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
          export GITHUB_TOKEN=$(echo $SECRET_JSON | jq -r .GITHUB_TOKEN)

          if [ -z "$GITHUB_TOKEN" ]; then
            echo "ERROR: Github token missing from Secrets Manager"
            exit 1
          fi
          envsubst '$GITHUB_TOKEN' < k8s/eks/secrets/argocd-secrets.yml | kubectl apply -f -

          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update argo

          echo "Installing Argo CD Helm Chart..."
          for i in {1..5}; do
            if helm upgrade -i argocd argo/argo-cd \
              --namespace argocd \
              --version 9.5.15 \
              -f k8s/eks/argocd/values.yml; then
              echo "Helm argo/argo-cd install successful!"
              break
            fi

            if [ $i -eq 5 ]; then
              echo "ERROR: Helm argo/argo-cd install failed after 5 attempts."
              exit 1
            fi

            echo "Webhook not ready, retrying in 5 seconds..."
            sleep 5
          done

          echo "Creating ecr login config map..."
          kubectl create configmap ecr-login-script \
            --from-literal=ecr-login.sh='#!/bin/sh
          echo "AWS:$(aws ecr get-login-password --region us-east-2)"' \
            -n argocd \
            --dry-run=client -o yaml | kubectl apply -f -

          for i in {1..5}; do
            if helm upgrade -i argocd-image-updater argo/argocd-image-updater \
              --namespace argocd \
              --version 1.2.1 \
              --set config.argocd.serverAddress=http://argocd-server.argocd.svc.cluster.local \
              --set config.argocd.insecure=true \
              --set config.argocd.grpcWeb=true \
              --set config.registries[0].name=ECR \
              --set config.registries[0].prefix="131912109503.dkr.ecr.us-east-2.amazonaws.com" \
              --set config.registries[0].api_url="https://131912109503.dkr.ecr.us-east-2.amazonaws.com" \
              --set config.registries[0].credentials="ext:/app/scripts/ecr-login.sh" \
              --set config.registries[0].credsexpire=10h \
              --set "extraVolumes[0].name=ecr-login" \
              --set "extraVolumes[0].configMap.name=ecr-login-script" \
              --set "extraVolumes[0].configMap.defaultMode=0755" \
              --set "extraVolumeMounts[0].name=ecr-login" \
              --set "extraVolumeMounts[0].mountPath=/app/scripts"; then
                echo "Helm argo/argocd-image-updater install successful!"
                break
              fi

            if [ $i -eq 5 ]; then
              echo "ERROR: Helm argo/argocd-image-updater install failed after 5 attempts."
              exit 1
            fi

            echo "Webhook not ready, retrying in 5 seconds..."
            sleep 5
          done

          echo "Applying Argo CD Applications for Frontend and Backend..."
          kubectl apply -f k8s/eks/argocd/apps/

          echo "Applying Argo CD Image Updater..."
          kubectl apply -f k8s/eks/argocd/img-updaters.yml

      - name: Install kube-prometheus-stack
        run: |
          echo "Creating monitoring namespace..."
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

          echo "Injecting Grafana Admin Username and Password from Secrets Manager..."
          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $APP_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
          export GRAFANA_USER=$(echo $SECRET_JSON | jq -r .GF_SECURITY_ADMIN_USER)
          export GRAFANA_PASS=$(echo $SECRET_JSON | jq -r .GF_SECURITY_ADMIN_PASSWORD)

          if [ -z "$GRAFANA_USER" ] || [ -z "$GRAFANA_PASS" ]; then
            echo "ERROR: Grafana credentials missing from Secrets Manager"
            exit 1
          fi
          envsubst '$GRAFANA_USER $GRAFANA_PASS' < k8s/eks/secrets/grafana-secrets.yml | kubectl apply -f -

          echo "Integrating Discord alerts..."
          export DISCORD_WEBHOOK=$(echo $SECRET_JSON | jq -r .DISCORD_WEBHOOK)

          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "ERROR: Discord webhook URL missing from Secrets Manager"
            exit 1
          fi
          envsubst '$DISCORD_WEBHOOK' < k8s/eks/secrets/alert-secrets.yml | kubectl apply -f -

          echo "Installing kube-prometheus-stack Helm..."
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          for i in {1..5}; do
            if helm upgrade -i kube-prom prometheus-community/kube-prometheus-stack \
              --namespace monitoring \
              --version "85.2.0" \
              -f k8s/eks/monitoring/values.yml; then
              echo "Helm prometheus-community/kube-prometheus-stack install successful!"
              break
            fi

            if [ $i -eq 5 ]; then
              echo "ERROR: Helm prometheus-community/kube-prometheus-stack install failed after 5 attempts."
              exit 1
            fi

            echo "Webhook not ready, retrying in 5 seconds..."
            sleep 5
          done

          echo "Applying backend service monitoring..."
          kubectl apply -f k8s/eks/monitoring/backend-svcmon.yml

          echo "Applying Custom Prometheus Alerting Rules..."
          kubectl apply -f k8s/eks/monitoring/alerts.yml

      - name: Deploy Kubernetes Application
        run: |
          echo "Fetching Dynamic Secrets for K8s..."
          DB_SECRET_ARN=$(aws ssm get-parameter --name "/todo/config/db_secret_arn" --region $AWS_REGION --query "Parameter.Value" --output text)
          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $DB_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
          export DB_PASS=$(echo $SECRET_JSON | jq -r .password)

          echo "Fetching JWT for backend K8s..."
          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $APP_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
          export JWT_TOKEN=$(echo $SECRET_JSON | jq -r .BACKEND_JWT_STRING)

          if [ -z "$DB_PASS" ] || [ -z "$JWT_TOKEN" ]; then
            echo "ERROR: Application secrets missing from Secrets Manager"
            exit 1
          fi

          echo "Creating ConfigMap for DB Initialization Script..."
          kubectl create configmap db-init-script \
            --from-file=init.sql=database/init.sql \
            --dry-run=client -o yaml | kubectl apply -f -

          echo "Applying Manifests..."
          envsubst < k8s/eks/secrets/default-secrets.yml | kubectl apply -f -

          export FRONTEND_IMG_TAG=${GITHUB_SHA::7}
          export BACKEND_IMG_TAG=${GITHUB_SHA::7}

          for i in {1..5}; do
            if kubectl apply -f k8s/eks/ingress.yml; then
              echo "Ingress applied successfully!"
              break
            fi

            if [ $i -eq 5 ]; then
              echo "ERROR: Failed to apply Ingress after 5 attempts."
              exit 1
            fi

            echo "Webhook not ready, retrying in 5 seconds..."
            sleep 5
          done

          echo "Applying grafana dashboard..."
          kubectl apply -f k8s/eks/monitoring/graf-dash-cfm.yml

      - name: Wait for Load Balancer DNS
        run: |
          echo "Waiting for ALB to be provisioned and DNS to be assigned..."
          kubectl wait --for=jsonpath='{.status.loadBalancer.ingress[0].hostname}' \
            ingress/todo-ingress \
            --timeout=10m
          ALB_DNS=$(kubectl get ingress todo-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "ALB provisioned: $ALB_DNS"

      - name: Update Porkbun DNS Record
        run: |
          echo "Fetching ALB DNS..."
          ALB_DNS=$(kubectl get ingress todo-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          echo "Fetching Porkbun Secrets..."
          SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $APP_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
          PORKBUN_API=$(echo $SECRET_JSON | jq -r .PORKBUN_API_KEY)
          PORKBUN_SECRET=$(echo $SECRET_JSON | jq -r .PORKBUN_SECRET_KEY)

          echo "Updating DNS Record for ALB on Porkbun..."
          curl -X POST "https://api.porkbun.com/api/json/v3/dns/editByNameType/onlytodo.xyz/ALIAS" \
            -H "Content-Type: application/json" \
            -d "{ \"secretapikey\": \"$PORKBUN_SECRET\", \"apikey\": \"$PORKBUN_API\", \"content\": \"$ALB_DNS\", \"ttl\": \"3600\" }"
          echo "EKS ALB DNS Updated Successfully: $ALB_DNS."

          curl -X POST "https://api.porkbun.com/api/json/v3/dns/editByNameType/onlytodo.xyz/CNAME/*" \
            -H "Content-Type: application/json" \
            -d "{ \"secretapikey\": \"$PORKBUN_SECRET\", \"apikey\": \"$PORKBUN_API\", \"content\": \"$ALB_DNS\", \"ttl\": \"3600\" }"
          echo "EKS ALB DNS Updated Successfully: $ALB_DNS."
