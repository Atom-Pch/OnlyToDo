name: Infra - Morning Startup

on:
  workflow_dispatch:

env:
  AWS_ROLE_ARN: "arn:aws:iam::131912109503:role/GitHubActionsRole"
  APP_SECRET_ARN: "arn:aws:secretsmanager:us-east-2:131912109503:secret:OnlyToDo/Prod/All-rIjbxb"
  AWS_ACCOUNT_ID: "131912109503"
  AWS_REGION: "us-east-2"
  FRONTEND_REPO: "onlytodo-frontend"
  BACKEND_REPO: "onlytodo-backend"
  EKS_CLUSTER: "onlytodo"

permissions:
  id-token: write
  contents: read

jobs:
  provision_infra:
    name: Provision Infra with Terraform
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init and Apply
        working-directory: infra/terraform/
        run: |
          terraform init
          terraform apply -auto-approve

  upload_frontend:
    name: Build and Push Frontend Images
    needs: provision_infra
    uses: ./.github/workflows/build-image.yml
    with:
      repo_name: onlytodo-frontend
      context: ./frontend

  upload_backend:
    name: Build and Push Backend Images
    needs: provision_infra
    uses: ./.github/workflows/build-image.yml
    with:
      repo_name: onlytodo-backend
      context: ./backend

  prepare_cluster:
    name: Prepare Cluster with AWS LBC and Namespaces
    needs: provision_infra
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4
          chmod 700 get_helm.sh
          ./get_helm.sh

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Install AWS Load Balancer Controller
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters "Name=tag:Name,Values=onlytodo" \
            --query 'Vpcs[0].VpcId' \
            --output text)

          helm repo add eks https://aws.github.io/eks-charts
          helm repo update
          helm upgrade -i aws-load-balancer-controller eks/aws-load-balancer-controller \
            --version 3.2.2 \
            -n kube-system \
            --set clusterName=$EKS_CLUSTER \
            --set serviceAccount.create=true \
            --set serviceAccount.name=aws-load-balancer-controller \
            --set region=$AWS_REGION \
            --set vpcId=$VPC_ID \
            --set image.repository=602401143452.dkr.ecr.us-east-2.amazonaws.com/amazon/aws-load-balancer-controller

          kubectl rollout status deployment aws-load-balancer-controller -n kube-system --timeout=2m

      - name: Create Namespaces
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

  setup_argocd:
    name: Setup Argo CD and Argo CD Image Updater
    needs: prepare_cluster
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4
          chmod 700 get_helm.sh
          ./get_helm.sh

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Inject ECR Credentials to Argo CD
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region us-east-2)

          kubectl create secret docker-registry aws-ecr-creds \
            --docker-server=131912109503.dkr.ecr.us-east-2.amazonaws.com \
            --docker-username=AWS \
            --docker-password=$ECR_TOKEN \
            --namespace=argocd \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply ArgoCD Secrets
        run: |
          APP_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $APP_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
          export GITHUB_TOKEN=$(echo $APP_SECRET_JSON | jq -r .GITHUB_TOKEN)

          if [ -z "$GITHUB_TOKEN" ]; then
            echo "ERROR: Github token missing from Secrets Manager"
            exit 1
          fi
          envsubst '$GITHUB_TOKEN' < deploy/secret-templates/argocd.yml | kubectl apply -f -

      - name: Install Argo CD
        run: |
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo update argo

          for i in {1..3}; do
            if helm upgrade -i argocd argo/argo-cd \
              --namespace argocd \
              --version 9.5.15 \
              -f deploy/argocd/values.yml; then
              break
            fi

            if [ $i -eq 3 ]; then
              echo "ERROR: Helm argo/argo-cd upgrade/install failed after 3 attempts."
              exit 1
            fi

            echo "Helm failed to upgrade/install, retrying in 10 seconds..."
            sleep 10
          done

          kubectl apply -f deploy/argocd/apps/

      - name: Install Argo CD Image Updater
        run: |
          for i in {1..3}; do
            if helm upgrade -i argocd-image-updater argo/argocd-image-updater \
              --namespace argocd \
              --version 1.2.1; then
                break
              fi

            if [ $i -eq 3 ]; then
              echo "ERROR: Helm argo/argocd-image-updater upgrade/install failed after 3 attempts."
              exit 1
            fi

            echo "Helm failed to upgrade/install, retrying in 10 seconds..."
            sleep 10
          done

          kubectl apply -f deploy/argocd/img-updaters.yml

  setup_monitoring:
    name: Setup Monitoring with Prometheus and Grafana
    needs: prepare_cluster
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4
          chmod 700 get_helm.sh
          ./get_helm.sh

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Apply Monitoring Secrets
        run: |
          APP_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $APP_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
          export GRAFANA_USER=$(echo $APP_SECRET_JSON | jq -r .GF_SECURITY_ADMIN_USER)
          export GRAFANA_PASS=$(echo $APP_SECRET_JSON | jq -r .GF_SECURITY_ADMIN_PASSWORD)
          export DISCORD_WEBHOOK=$(echo $APP_SECRET_JSON | jq -r .DISCORD_WEBHOOK)

          if [ -z "$GRAFANA_USER" ] || [ -z "$GRAFANA_PASS" ] || [ -z "$DISCORD_WEBHOOK" ]; then
            echo "ERROR: Secrets missing from Secrets Manager"
            exit 1
          fi

          envsubst '$GRAFANA_USER $GRAFANA_PASS' < deploy/secret-templates/grafana.yml | kubectl apply -f -
          envsubst '$DISCORD_WEBHOOK' < deploy/secret-templates/alertmanager.yml | kubectl apply -f -

      - name: Install kube-prometheus-stack
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          for i in {1..3}; do
            if helm upgrade -i kube-prom prometheus-community/kube-prometheus-stack \
              --namespace monitoring \
              --version "85.2.0" \
              -f deploy/monitoring/values.yml; then
              break
            fi

            if [ $i -eq 3 ]; then
              echo "ERROR: Helm prometheus-community/kube-prometheus-stack upgrade/install failed after 3 attempts."
              exit 1
            fi

            echo "Helm failed to upgrade/install, retrying in 10 seconds..."
            sleep 10
          done

          kubectl apply -f deploy/monitoring/backend-svcmon.yml
          kubectl apply -f deploy/monitoring/alert-rules.yml
          kubectl apply -f deploy/monitoring/graf-dash-confmap.yml

  deploy_application:
    name: Deploy Application
    needs: [upload_frontend, upload_backend, setup_argocd, setup_monitoring]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Helm
        run: |
          curl -fsSL -o get_helm.sh https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-4
          chmod 700 get_helm.sh
          ./get_helm.sh

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Apply Application Secrets
        run: |
          DB_SECRET_ARN=$(aws ssm get-parameter --name "/onlytodo/config/db_secret_arn" --region $AWS_REGION --query "Parameter.Value" --output text)
          DB_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $DB_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
          export DB_PASS=$(echo $DB_SECRET_JSON | jq -r .password)

          APP_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $APP_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
          export JWT_TOKEN=$(echo $APP_SECRET_JSON | jq -r .BACKEND_JWT_STRING)

          if [ -z "$DB_PASS" ] || [ -z "$JWT_TOKEN" ]; then
            echo "ERROR: Application secrets missing from Secrets Manager"
            exit 1
          fi

          envsubst '$DB_PASS $JWT_TOKEN' < deploy/secret-templates/app.yml | kubectl apply -f -

      - name: Apply Config Map for DB Initialization
        run: |
          kubectl create configmap db-init-script \
            --from-file=init.sql=database/init.sql \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Wait for Load Balancer DNS
        run: |
          sleep 30
          kubectl wait --for=jsonpath='{.status.loadBalancer.ingress[0].hostname}' \
            ingress/onlytodo-ingress --timeout=10m
          ALB_DNS=$(kubectl get ingress onlytodo-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "ALB provisioned: $ALB_DNS"

  update_dns:
    name: Update Porkbun DNS Record
    needs: deploy_application
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Point DNS to ALB
        run: |
          ALB_DNS=$(kubectl get ingress onlytodo-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

          APP_SECRET_JSON=$(aws secretsmanager get-secret-value --secret-id $APP_SECRET_ARN --region $AWS_REGION --query SecretString --output text)
          PORKBUN_API=$(echo $APP_SECRET_JSON | jq -r .PORKBUN_API_KEY)
          PORKBUN_SECRET=$(echo $APP_SECRET_JSON | jq -r .PORKBUN_SECRET_KEY)

          curl -X POST "https://api.porkbun.com/api/json/v3/dns/editByNameType/onlytodo.xyz/ALIAS" \
            -H "Content-Type: application/json" \
            -d "{ \"secretapikey\": \"$PORKBUN_SECRET\", \"apikey\": \"$PORKBUN_API\", \"content\": \"$ALB_DNS\", \"ttl\": \"3600\" }"

          curl -X POST "https://api.porkbun.com/api/json/v3/dns/editByNameType/onlytodo.xyz/CNAME/*" \
            -H "Content-Type: application/json" \
            -d "{ \"secretapikey\": \"$PORKBUN_SECRET\", \"apikey\": \"$PORKBUN_API\", \"content\": \"$ALB_DNS\", \"ttl\": \"3600\" }"

          echo -e "\nDNS updated: $ALB_DNS"
