name: CI - Test & Build

on:
  push:
    branches: ["main"]
    paths:
      - backend/**
      - frontend/**
  workflow_dispatch:

env:
  AWS_ROLE_ARN: "arn:aws:iam::131912109503:role/GitHubActionsRole"
  AWS_ACCOUNT_ID: "131912109503"
  AWS_REGION: "us-east-2"
  FRONTEND_REPO: "onlytodo-frontend"
  BACKEND_REPO: "onlytodo-backend"

permissions:
  id-token: write
  contents: read

jobs:
  lint_frontend:
    name: Lint & Check Frontend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "22.19.0"
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend/
        run: npm ci

      - name: Lint
        working-directory: ./frontend/
        run: npm run lint

      - name: Check
        working-directory: ./frontend/
        run: npm run check

  lint_backend:
    name: Lint Backend
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.4"
          cache-dependency-path: ./backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          working-directory: ./backend/

  playwright_test:
    name: Run E2E Tests with Playwright
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.50.0-noble # noble = ubuntu 24.04 base
    steps:
      - uses: actions/checkout@v6

      - name: Install Playwright
        working-directory: ./frontend/
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Run Tests
        working-directory: ./frontend/
        run: |
          npm run test

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-report
          path: ./frontend/test-results/
          retention-days: 1

  build_frontend:
    needs: playwright_test
    uses: ./.github/workflows/build-image.yml
    with:
      repo_name: onlytodo-frontend
      context: ./frontend

  build_backend:
    needs: playwright_test
    uses: ./.github/workflows/build-image.yml
    with:
      repo_name: onlytodo-backend
      context: ./backend
