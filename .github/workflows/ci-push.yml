name: CI - Test & Build

on:
  push:
    branches: ["main"]
    paths:
      - backend/**
      - frontend/**
  workflow_dispatch:

env:
  AWS_ROLE_ARN: "arn:aws:iam::131912109503:role/GitHubActionsRole"
  AWS_ACCOUNT_ID: "131912109503"
  AWS_REGION: "us-east-2"
  FRONTEND_REPO: "todo-frontend-repo"
  BACKEND_REPO: "todo-backend-repo"

permissions:
  id-token: write
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.50.0-noble # noble = ubuntu 24.04 base
    steps:
      - uses: actions/checkout@v6
      - name: Run E2E tests
        working-directory: frontend/tests/
        run: |
          npm ci
          npx playwright install --with-deps
          npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/test-results-cicd
          retention-days: 1

  build_frontend:
    needs: test
    uses: ./.github/workflows/build-image.yml
    with:
      repo_name: todo-frontend-repo
      context: ./frontend

  build_backend:
    needs: test
    uses: ./.github/workflows/build-image.yml
    with:
      repo_name: todo-backend-repo
      context: ./backend
