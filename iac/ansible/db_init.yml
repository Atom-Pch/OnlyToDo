---
- name: RDS Initialization
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ec2_instance_id: "i-02182da06a4d13a0a"
    db_secret_arn: "arn:aws:secretsmanager:us-east-2:131912109503:secret:rds!db-43bd5731-249f-49fe-93b5-82fefd9f9e2e-GmvEvT"

    # Static Infrastructure Details
    rds_endpoint: "todo-db.c962yekmm5ja.us-east-2.rds.amazonaws.com"
    region: "us-east-2"

    # Database Configuration
    db_name: "todo_db"
    db_port: 5432
    sql_file: "../../database/init.sql"

    # The core table to check for idempotency
    core_table_name: "users"

  tasks:
    - name: Fetch DB Credentials via Lookup
      ansible.builtin.set_fact:
        db_creds: "{{ lookup('amazon.aws.aws_secret', db_secret_arn, region=region) | from_json }}"
      no_log: true

    - name: Establish SSM Tunnel (Background)
      ansible.builtin.shell: |
        nohup aws ssm start-session \
          --target "{{ ec2_instance_id }}" \
          --document-name AWS-StartPortForwardingSessionToRemoteHost \
          --parameters host="{{ rds_endpoint }}",portNumber="{{ db_port }}",localPortNumber="{{ db_port }}" > /dev/null 2>&1 &
      changed_when: false

    - name: Wait for tunnel to stabilize
      ansible.builtin.wait_for:
        port: "{{ db_port }}"
        host: 127.0.0.1
        timeout: 30

    - name: Check if Core Table exists in Database
      community.postgresql.postgresql_query:
        login_host: "127.0.0.1"
        login_user: "{{ db_creds.username }}"
        login_password: "{{ db_creds.password }}"
        login_port: "{{ db_port }}"
        login_db: "{{ db_name }}"
        query: >
          SELECT EXISTS (
            SELECT FROM information_schema.tables
            WHERE table_schema = 'public'
            AND table_name = '{{ core_table_name }}'
          );
      register: table_check

    - name: Initialization Block (Runs if table is missing)
      when: not table_check.query_result[0].exists
      block:
        - name: Run SQL initialization script
          community.postgresql.postgresql_script:
            login_host: "127.0.0.1"
            login_user: "{{ db_creds.username }}"
            login_password: "{{ db_creds.password }}"
            login_port: "{{ db_port }}"
            login_db: "{{ db_name }}"
            path: "{{ sql_file }}"

        - name: Log Initialization Success
          ansible.builtin.debug:
            msg: "Database was empty. Initialization script applied successfully."

      always:
        - name: Terminate SSM Tunnel and Plugin Processes
          ansible.builtin.shell: |
            set -o pipefail
            pkill -9 -f "session-manager-plugin" || true
            pkill -9 -f "aws ssm start-session.*{{ ec2_instance_id }}" || true
            lsof -t -i :{{ db_port }} | xargs -r kill -9 || true
          failed_when: false
          changed_when: false

    - name: Skip Initialization Log
      when: table_check.query_result[0].exists
      ansible.builtin.debug:
        msg: "Table '{{ core_table_name }}' found. Database is already initialized. Skipping."

    # Failsafe cleanup just in case the block was skipped
    - name: Failsafe Terminate SSM Tunnel
      ansible.builtin.shell: |
        set -o pipefail
        fuser -k 5432/tcp
      failed_when: false
      changed_when: false
