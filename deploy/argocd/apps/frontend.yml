apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: onlytodo-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Atom-Pch/OnlyToDo.git
    targetRevision: main
    path: deploy/charts/frontend
    helm:
      valueFiles:
        - values.yml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
