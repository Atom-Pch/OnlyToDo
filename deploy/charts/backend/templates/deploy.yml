apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  # HA
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      initContainers:
        - name: db-init
          image: postgres:18-alpine
          envFrom:
            - configMapRef:
                name: backend-config
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: onlytodo-backend
                  key: db_pass
          command:
            - sh
            - -c
            - |
              set -e  # ← exit immediately if any command fails
              echo "Checking if Core Table exists in Database..."
              TABLE_EXISTS=$(psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -tAc \
                "SELECT EXISTS (SELECT FROM information_schema.tables WHERE table_schema = 'public' AND table_name = 'users');")

              if [ "$TABLE_EXISTS" = "f" ]; then
                echo "Database was empty. Applying initialization script..."
                psql -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME -f /scripts/init.sql
                echo "Initialization script applied successfully."
              else
                echo "Table found. Skipping."
              fi
          volumeMounts:
            - name: script-volume
              mountPath: /scripts
      containers:
        - name: backend
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
            - containerPort: 9090 # For Prometheus Metrics

          # Resource Requests and Limits
          resources:
            requests:
              memory: 128Mi
              cpu: 256m
            limits:
              memory: 512Mi
              cpu: 1024m

          envFrom:
            - configMapRef:
                name: backend-config

            # --- SECURE VARIABLES ---
          env:
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: onlytodo-backend
                  key: db_pass
            - name: JWT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: onlytodo-backend
                  key: jwt_token

          # Readiness and Liveness Probes
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15

      # --- NEW VOLUME FOR THE CONFIGMAP ---
      volumes:
        - name: script-volume
          configMap:
            name: db-init-script

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
spec:
  selector:
    app: backend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: 9090
  type: ClusterIP # ClusterIP means it's only accessible from inside the K8s cluster
