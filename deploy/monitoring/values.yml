prometheus:
  prometheusSpec:
    # Watch ServiceMonitors across ALL namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    retention: 24h
    resources:
      requests:
        memory: 256Mi
        cpu: 128m
      limits:
        memory: 1024Mi
        cpu: 512m

grafana:
  admin:
    existingSecret: todo-secrets-grafana
    userKey: admin-user
    passwordKey: admin-password
  persistence:
    enabled: false # keep off to avoid EBS costs; dashboards come from configmaps
  # Import your existing Go dashboard by its Grafana.com ID or embed it
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: custom
          folder: Custom
          type: file
          options:
            path: /var/lib/grafana/dashboards/custom
  dashboardsConfigMaps:
    custom: grafana-dashboard

  ingress:
    enabled: true
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-2:131912109503:certificate/3f2971ec-a640-4a4d-8c86-5a67a803d284
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
      alb.ingress.kubernetes.io/ssl-redirect: "443"
      alb.ingress.kubernetes.io/group.name: todo-shared-alb # Groups them together!
      alb.ingress.kubernetes.io/group.order: "10"
    hosts:
      - monitoring.onlytodo.xyz
    paths:
      - /*

  grafana.ini:
    auth.anonymous:
      enabled: true
      org_role: Viewer
      # (Optional) Hides the version number at the bottom for a cleaner look
      hide_version: true

alertmanager:
  enabled: true

  alertmanagerSpec:
    secrets:
      - todo-secrets-alertmanager # mounts the secret into the pod

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by:
        - alertname
        - namespace
      group_wait: 1m
      group_interval: 5m
      repeat_interval: 12h
      receiver: discord
      routes:
        # Critical alerts fire immediately without grouping wait
        - matchers:
            - severity = critical
          receiver: discord
          group_wait: 0s
        # Silence Watchdog (it's just a heartbeat alert) and info-level alerts (often noisy)
        - matchers:
            - alertname = Watchdog
          receiver: "null"
        - matchers:
            - severity = info
          receiver: "null"

    receivers:
      - name: "null"
      - name: discord
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/todo-secrets-alertmanager/discord-webhook
            send_resolved: true
            title:
              '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper
              }}] {{ .GroupLabels.alertname }}'
            text: |
              {{ range .Alerts }}
              **Severity:** {{ .Labels.severity | toUpper }}
              **Namespace:** {{ .Labels.namespace }}
              {{ if .Annotations.summary }}**Summary:** {{ .Annotations.summary }}{{ end }}
              {{ if .Annotations.description }}**Description:** {{ .Annotations.description }}{{ end }}
              {{ end }}

# Possible false positives
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false
